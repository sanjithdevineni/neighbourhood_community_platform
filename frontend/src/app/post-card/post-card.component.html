<article class="post-card">

  <header class="post-header">
    <div class="avatar" aria-hidden="true">
      {{ authorInitials }}
    </div>

    <div class="meta">
      <h3>{{ author }}</h3>
      <p class="timestamp">{{ timestamp }}</p>
    </div>
  </header>

  <div class="post-body">
    <h4 *ngIf="title">{{ title }}</h4>
    <p class="post-content">{{ content }}</p>
  </div>

</article>
