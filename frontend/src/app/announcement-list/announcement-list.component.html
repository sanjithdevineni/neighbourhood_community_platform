<section class="announcement-list" aria-label="Announcement feed">
  <form class="create-post-box" (ngSubmit)="createPost()">
    <div class="composer-avatar" aria-hidden="true">YO</div>
    <div class="composer-content">
      <label class="composer-label" for="new-post">Create a post</label>
      <textarea
        id="new-post"
        name="newPostContent"
        [(ngModel)]="newPostContent"
        (ngModelChange)="onContentChange()"
        placeholder="Post an announcement or question to neighbors..."
        rows="3"
      ></textarea>
      <p class="validation-error" *ngIf="showValidationError">
        Post content cannot be empty.
      </p>
      <div class="composer-actions">
        <button type="submit">Post</button>
      </div>
    </div>
  </form>

  <div class="feed-header">
    <h2>Recent Activity</h2>
    <div class="feed-filters">
      <span class="filter active">Recent</span>
      <span class="filter">Top</span>
    </div>
  </div>

  <p *ngIf="isLoading">Loading announcements...</p>
  <p *ngIf="errorMessage">{{ errorMessage }}</p>

  <app-post-card
    *ngFor="let announcement of filteredAnnouncements; trackBy: trackById"
    [author]="announcement.author"
    [timestamp]="announcement.CreatedAt | date:'short'"
    [content]="announcement.content"
    [title]="announcement.title">
  </app-post-card>
</section>
