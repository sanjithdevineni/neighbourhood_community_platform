server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: community-platform
    static_configs:
      - targets:
          - localhost
        labels:
          job: community-platform
          __path__: /var/log/app/app.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            msg: msg
            method: method
            path: path
            status: status
            latency_ms: latency_ms
      - labels:
          level:
          method:
          status:
